# ponytail: single container, no cluster, no plugins beyond APOC
services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474" # browser
      - "7687:7687" # bolt
    environment:
      - NEO4J_AUTH=neo4j/changeme
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./battles.csv:/var/lib/neo4j/import/battles.csv
      - ./init.sql:/var/lib/neo4j/import/init.sql
      - neo4j_data:/data

volumes:
  neo4j_data:
