apiVersion: apps/v1
kind: Deployment
metadata:
  name: featurizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: featurizer
  template:
    metadata:
      labels:
        app: featurizer
    spec:
      containers:
        - name: featurizer
          image: ml-lab-05-featurizer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: pipeline-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: featurizer
spec:
  selector:
    app: featurizer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
