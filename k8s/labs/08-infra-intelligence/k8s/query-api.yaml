apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-api
  namespace: infra-intelligence
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-api
  template:
    metadata:
      labels:
        app: query-api
    spec:
      containers:
        - name: query-api
          image: ml-lab-08-query-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: query-api
  namespace: infra-intelligence
spec:
  type: NodePort
  selector:
    app: query-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30088
