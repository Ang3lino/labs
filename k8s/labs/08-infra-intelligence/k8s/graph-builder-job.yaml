apiVersion: batch/v1
kind: Job
metadata:
  name: infra-graph-builder
  namespace: infra-intelligence
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-neo4j
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z neo4j 7687; do echo waiting for neo4j; sleep 3; done"]
      containers:
        - name: graph-builder
          image: ml-lab-08-graph-builder:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: sample-data
              mountPath: /data
          command: ["python", "-c", "from app import build_graph; print(build_graph())"]
      volumes:
        - name: sample-data
          configMap:
            name: infra-sample-data
