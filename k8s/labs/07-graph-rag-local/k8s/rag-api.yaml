apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: graph-rag
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
      containers:
        - name: rag-api
          image: ml-lab-07-rag-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: graph-rag
spec:
  type: NodePort
  selector:
    app: rag-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30087
