apiVersion: batch/v1
kind: Job
metadata:
  name: graph-rag-ingestion
  namespace: graph-rag
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-neo4j
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z neo4j 7687; do echo waiting for neo4j; sleep 3; done"]
      containers:
        - name: ingestion
          image: ml-lab-07-ingestion:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-c", "from app import ingest; print(ingest())"]
