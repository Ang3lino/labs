apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-autoscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-autoscale
  template:
    metadata:
      labels:
        app: ml-autoscale
    spec:
      containers:
        - name: ml-autoscale
          image: ml-lab-03:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
